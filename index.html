<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PONG</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Press Start 2P', monospace;
      overflow: hidden;
    }

    /* Scanlines effect */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.15) 2px,
        rgba(0,0,0,0.15) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    /* CRT glow */
    body::after {
      content: '';
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.7) 100%);
      pointer-events: none;
      z-index: 99;
    }

    .game-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .title {
      color: #fff;
      font-size: 36px;
      letter-spacing: 20px;
      text-shadow:
        0 0 10px #fff,
        0 0 20px #fff,
        0 0 40px #0ff,
        0 0 80px #0ff;
      animation: flicker 4s infinite;
    }

    @keyframes flicker {
      0%,95%,97%,99%,100% { opacity: 1; }
      96%,98% { opacity: 0.8; }
    }

    .scoreboard {
      display: flex;
      gap: 80px;
      color: #fff;
      font-size: 48px;
      text-shadow: 0 0 20px #0ff, 0 0 40px #0ff;
      min-width: 300px;
      justify-content: center;
    }

    .player-label {
      font-size: 8px;
      color: #0ff;
      text-align: center;
      display: flex;
      gap: 120px;
      text-shadow: 0 0 10px #0ff;
    }

    canvas {
      border: 2px solid #fff;
      box-shadow:
        0 0 10px #0ff,
        0 0 30px #0ff,
        0 0 60px rgba(0,255,255,0.3),
        inset 0 0 30px rgba(0,0,0,0.5);
      display: block;
      image-rendering: pixelated;
    }

    .speed-bar-wrapper {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .speed-label {
      color: #555;
      font-size: 7px;
    }

    .speed-bar-bg {
      width: 200px;
      height: 8px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 4px;
      overflow: hidden;
    }

    .speed-bar-fill {
      height: 100%;
      width: 10%;
      background: linear-gradient(90deg, #0ff, #f0f);
      border-radius: 4px;
      transition: width 0.4s ease, background 0.4s ease;
      box-shadow: 0 0 8px #0ff;
    }

    .speed-level {
      color: #0ff;
      font-size: 10px;
      text-shadow: 0 0 10px #0ff;
      min-width: 16px;
      text-align: center;
    }

    .controls {
      color: #555;
      font-size: 7px;
      text-align: center;
      line-height: 2.2;
    }

    .controls span {
      color: #0ff;
      text-shadow: 0 0 8px #0ff;
    }

    #message {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #fff;
      font-size: 14px;
      text-align: center;
      text-shadow: 0 0 20px #0ff, 0 0 40px #0ff;
      line-height: 2;
      pointer-events: none;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%,100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .canvas-container {
      position: relative;
    }
  </style>
</head>
<body>

<div class="game-wrapper">
  <div class="title">PONG</div>

  <div class="player-label">
    <span>JUGADOR 1</span>
    <span>JUGADOR 2</span>
  </div>

  <div class="scoreboard">
    <span id="score1">0</span>
    <span id="score2">0</span>
  </div>

  <div class="canvas-container">
    <canvas id="pong" width="800" height="500"></canvas>
    <div id="message">PRESIONA ESPACIO<br>PARA COMENZAR</div>
  </div>

  <div class="speed-bar-wrapper">
    <div class="speed-label">VELOCIDAD</div>
    <div class="speed-bar-bg">
      <div class="speed-bar-fill" id="speedBar"></div>
    </div>
    <div class="speed-level" id="speedLevel">1</div>
  </div>

  <div class="controls">
    <span>W / S</span> — JUGADOR 1 &nbsp;&nbsp;&nbsp; <span>↑ / ↓</span> — JUGADOR 2 &nbsp;&nbsp;&nbsp; <span>ESPACIO</span> — PAUSAR
  </div>
</div>

<script>
  const canvas = document.getElementById('pong');
  const ctx = canvas.getContext('2d');
  const msg = document.getElementById('message');
  const score1El = document.getElementById('score1');
  const score2El = document.getElementById('score2');

  const speedBarEl = document.getElementById('speedBar');
  const speedLevelEl = document.getElementById('speedLevel');

  const W = canvas.width, H = canvas.height;
  const PAD_W = 12, PAD_H = 90, PAD_SPEED = 6, BALL_SIZE = 10;
  const WIN_SCORE = 7;
  const BASE_SPEED = 5;
  const MAX_SPEED = 18;
  const SPEED_INTERVAL = 8000; // ms between speed boosts

  let gameState = 'waiting';
  let animId;
  let rallyTimer = 0;      // ms since last goal/start
  let lastBoostTime = 0;   // ms since last boost
  let currentSpeedMult = 1;
  let lastTs = 0;

  const state = {
    p1: { y: H/2 - PAD_H/2, score: 0, up: false, down: false, vy: 0 },
    p2: { y: H/2 - PAD_H/2, score: 0, up: false, down: false, vy: 0 },
    ball: { x: W/2, y: H/2, vx: 0, vy: 0 },
    trail: [],
    particles: []
  };

  // Flash state
  let flash = { active: false, life: 0, color: '#fff' };
  // Countdown state
  let countdown = { active: false, value: 3, timer: 0, nextDir: 1 };

  function spawnExplosion(x, y, color) {
    // Flash
    flash = { active: true, life: 1.0, color };

    // Massive burst — particles spread across whole screen
    const count = 120;
    for (let i = 0; i < count; i++) {
      const angle = (Math.PI * 2 / count) * i + (Math.random() - 0.5) * 0.5;
      const speed = 4 + Math.random() * 22;
      state.particles.push({
        x: W / 2, y: H / 2,   // all from center for max drama
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 1.0,
        decay: 0.008 + Math.random() * 0.010,
        size: 4 + Math.random() * 10,
        color: Math.random() < 0.5 ? color : '#fff',
        shape: Math.random() < 0.5 ? 'circle' : 'rect',
        rot: Math.random() * Math.PI * 2,
        rotV: (Math.random() - 0.5) * 0.25
      });
    }
    // Extra slow big chunks
    for (let i = 0; i < 20; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 1 + Math.random() * 5;
      state.particles.push({
        x: W / 2, y: H / 2,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 1.0,
        decay: 0.005 + Math.random() * 0.005,
        size: 10 + Math.random() * 18,
        color,
        shape: 'rect',
        rot: Math.random() * Math.PI * 2,
        rotV: (Math.random() - 0.5) * 0.15
      });
    }
    // Multiple expanding rings
    for (let r = 0; r < 3; r++) {
      state.particles.push({
        x: W / 2, y: H / 2, ring: true,
        radius: 10 + r * 30,
        maxRadius: 320 + r * 80,
        speed: 0.10 + r * 0.03,
        life: 1.0, decay: 0.012 + r * 0.004, color
      });
    }
  }

  function updateParticles() {
    for (let i = state.particles.length - 1; i >= 0; i--) {
      const p = state.particles[i];
      p.life -= p.decay;
      if (p.life <= 0) { state.particles.splice(i, 1); continue; }
      if (p.ring) { p.radius += (p.maxRadius - p.radius) * (p.speed || 0.12); continue; }
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.08;
      p.vx *= 0.98;
      p.rot += p.rotV;
    }
    // Flash decay
    if (flash.active) {
      flash.life -= 0.06;
      if (flash.life <= 0) flash.active = false;
    }
  }

  function drawParticles() {
    // Full-screen flash — drawn first, under particles
    if (flash.active) {
      ctx.globalAlpha = Math.max(0, flash.life);
      ctx.fillStyle = flash.color;
      ctx.fillRect(0, 0, W, H);
      ctx.globalAlpha = 1;
    }

    for (const p of state.particles) {
      ctx.globalAlpha = Math.max(0, p.life);
      if (p.ring) {
        ctx.strokeStyle = p.color;
        ctx.lineWidth = 3 + p.life * 4;
        ctx.shadowColor = p.color;
        ctx.shadowBlur = 30;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        ctx.stroke();
        ctx.shadowBlur = 0;
        continue;
      }
      ctx.fillStyle = p.color;
      ctx.shadowColor = p.color;
      ctx.shadowBlur = 12;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      if (p.shape === 'circle') {
        ctx.beginPath();
        ctx.arc(0, 0, p.size * Math.max(p.life, 0.1), 0, Math.PI * 2);
        ctx.fill();
      } else {
        const s = p.size * Math.max(p.life, 0.1);
        ctx.fillRect(-s/2, -s/2, s, s);
      }
      ctx.restore();
      ctx.shadowBlur = 0;
    }
    ctx.globalAlpha = 1;
  }

  function startCountdown(dir) {
    countdown = { active: true, value: 3, timer: 0, nextDir: dir };
    gameState = 'countdown';
  }

  function drawCountdown() {
    if (!countdown.active) return;
    const pulse = 0.85 + 0.15 * Math.sin(Date.now() / 80);
    const fontSize = Math.floor(160 * pulse);
    ctx.font = `${fontSize}px 'Press Start 2P', monospace`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = '#fff';
    ctx.shadowBlur = 60;
    ctx.fillStyle = '#fff';
    ctx.fillText(countdown.value, W / 2, H / 2);
    ctx.shadowBlur = 0;
    ctx.font = '10px monospace';
  }

  function resetBall(dir = 1) {
    state.ball.x = W / 2;
    state.ball.y = H / 2;
    const angle = (Math.random() * 0.6 - 0.3);
    state.ball.vx = dir * BASE_SPEED;
    state.ball.vy = Math.tan(angle) * BASE_SPEED;
    state.trail = [];
    currentSpeedMult = 1;
    rallyTimer = 0;
    lastBoostTime = 0;
    updateSpeedUI();
  }

  function startGame() {
    state.p1.score = 0;
    state.p2.score = 0;
    state.p1.y = H/2 - PAD_H/2; state.p1.vy = 0;
    state.p2.y = H/2 - PAD_H/2; state.p2.vy = 0;
    score1El.textContent = '0';
    score2El.textContent = '0';
    resetBall(1);
    gameState = 'playing';
    msg.style.display = 'none';
    loop();
  }

  function updateSpeedUI() {
    const level = Math.floor(currentSpeedMult * 10) / 10;
    const pct = Math.min(((currentSpeedMult - 1) / (MAX_SPEED / BASE_SPEED - 1)) * 100, 100);
    speedBarEl.style.width = Math.max(pct, 4) + '%';
    speedLevelEl.textContent = 'x' + level.toFixed(1);
    // Color shift: cyan → yellow → red as speed increases
    if (pct < 40) {
      speedBarEl.style.background = 'linear-gradient(90deg, #0ff, #0f8)';
      speedBarEl.style.boxShadow = '0 0 8px #0ff';
    } else if (pct < 70) {
      speedBarEl.style.background = 'linear-gradient(90deg, #ff0, #f80)';
      speedBarEl.style.boxShadow = '0 0 8px #ff0';
    } else {
      speedBarEl.style.background = 'linear-gradient(90deg, #f00, #f0f)';
      speedBarEl.style.boxShadow = '0 0 12px #f00';
    }
  }

  function update(delta) {
    if (gameState !== 'playing' && gameState !== 'countdown' && gameState !== 'goal') return;
    if (gameState === 'countdown' || gameState === 'goal') { updateParticles(); return; }

    // Accumulate rally time and apply speed boosts every SPEED_INTERVAL ms
    rallyTimer += delta;
    if (rallyTimer - lastBoostTime >= SPEED_INTERVAL) {
      lastBoostTime = rallyTimer;
      const currentSpeed = Math.sqrt(state.ball.vx**2 + state.ball.vy**2);
      if (currentSpeed < MAX_SPEED) {
        const newSpeed = Math.min(currentSpeed + 1.5, MAX_SPEED);
        const ratio = newSpeed / currentSpeed;
        state.ball.vx *= ratio;
        state.ball.vy *= ratio;
        currentSpeedMult = newSpeed / BASE_SPEED;
        updateSpeedUI();
      }
    }

    // Move paddles (track velocity for spin effect)
    const p1prevY = state.p1.y;
    const p2prevY = state.p2.y;
    if (state.p1.up)   state.p1.y = Math.max(0, state.p1.y - PAD_SPEED);
    if (state.p1.down) state.p1.y = Math.min(H - PAD_H, state.p1.y + PAD_SPEED);
    if (state.p2.up)   state.p2.y = Math.max(0, state.p2.y - PAD_SPEED);
    if (state.p2.down) state.p2.y = Math.min(H - PAD_H, state.p2.y + PAD_SPEED);
    state.p1.vy = state.p1.y - p1prevY;
    state.p2.vy = state.p2.y - p2prevY;

    // Move ball
    state.ball.x += state.ball.vx;
    state.ball.y += state.ball.vy;

    // Trail
    state.trail.push({ x: state.ball.x, y: state.ball.y });
    if (state.trail.length > 12) state.trail.shift();

    // Wall bounce
    if (state.ball.y <= BALL_SIZE/2) {
      state.ball.y = BALL_SIZE/2;
      state.ball.vy *= -1;
    }
    if (state.ball.y >= H - BALL_SIZE/2) {
      state.ball.y = H - BALL_SIZE/2;
      state.ball.vy *= -1;
    }

    // Paddle collision P1
    const p1x = 30;
    if (state.ball.x - BALL_SIZE/2 <= p1x + PAD_W &&
        state.ball.x - BALL_SIZE/2 >= p1x &&
        state.ball.y >= state.p1.y &&
        state.ball.y <= state.p1.y + PAD_H &&
        state.ball.vx < 0) {
      bounceOff(state.p1);
    }

    // Paddle collision P2
    const p2x = W - 30 - PAD_W;
    if (state.ball.x + BALL_SIZE/2 >= p2x &&
        state.ball.x + BALL_SIZE/2 <= p2x + PAD_W &&
        state.ball.y >= state.p2.y &&
        state.ball.y <= state.p2.y + PAD_H &&
        state.ball.vx > 0) {
      bounceOff(state.p2);
    }

    // Score
    if (state.ball.x < -20) {
      gameState = 'goal';
      state.ball.vx = 0; state.ball.vy = 0;
      spawnExplosion(30, state.ball.y, '#f0f');
      state.p2.score++;
      score2El.textContent = state.p2.score;
      checkWin(2);
    }
    if (state.ball.x > W + 20) {
      gameState = 'goal';
      state.ball.vx = 0; state.ball.vy = 0;
      spawnExplosion(W - 30, state.ball.y, '#0ff');
      state.p1.score++;
      score1El.textContent = state.p1.score;
      checkWin(1);
    }

    updateParticles();
  }

  function bounceOff(pad) {
    const speed = Math.min(Math.sqrt(state.ball.vx**2 + state.ball.vy**2) + 0.3, 14);
    const dir = state.ball.vx < 0 ? 1 : -1;
    // Football kick effect: paddle velocity determines spin.
    // If paddle is still → ball bounces straight. Faster paddle → more effect.
    const SPIN_FACTOR = 1.2;
    let newVy = pad.vy * SPIN_FACTOR;
    const maxVy = speed * 0.85; // cap at ~58 degrees
    newVy = Math.max(-maxVy, Math.min(maxVy, newVy));
    state.ball.vx = dir * Math.sqrt(speed * speed - newVy * newVy);
    state.ball.vy = newVy;
  }

  function checkWin(player) {
    const p = player === 1 ? state.p1 : state.p2;
    if (p.score >= WIN_SCORE) {
      gameState = 'gameover';
      msg.innerHTML = `JUGADOR ${player} GANA!<br><br>ESPACIO PARA REINICIAR`;
      msg.style.display = 'block';
    } else {
      // Start countdown after a brief explosion display
      setTimeout(() => startCountdown(player === 1 ? -1 : 1), 600);
    }
  }

  function drawCenterLine() {
    ctx.setLineDash([10, 10]);
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(W/2, 0);
    ctx.lineTo(W/2, H);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  function drawPaddle(x, y, glowColor) {
    // Glow
    ctx.shadowColor = glowColor;
    ctx.shadowBlur = 20;
    // Rounded rect manually
    const r = 4;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + PAD_W - r, y);
    ctx.quadraticCurveTo(x + PAD_W, y, x + PAD_W, y + r);
    ctx.lineTo(x + PAD_W, y + PAD_H - r);
    ctx.quadraticCurveTo(x + PAD_W, y + PAD_H, x + PAD_W - r, y + PAD_H);
    ctx.lineTo(x + r, y + PAD_H);
    ctx.quadraticCurveTo(x, y + PAD_H, x, y + PAD_H - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  function drawBall() {
    // Trail
    for (let i = 0; i < state.trail.length; i++) {
      const t = state.trail[i];
      const alpha = (i / state.trail.length) * 0.4;
      const size = BALL_SIZE * (i / state.trail.length) * 0.8;
      ctx.globalAlpha = alpha;
      ctx.fillStyle = '#0ff';
      ctx.beginPath();
      ctx.arc(t.x, t.y, size, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    // Ball glow
    ctx.shadowColor = '#0ff';
    ctx.shadowBlur = 25;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(state.ball.x, state.ball.y, BALL_SIZE/2, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  function draw() {
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(0, 0, W, H);

    drawCenterLine();
    drawPaddle(30, state.p1.y, '#0ff');
    drawPaddle(W - 30 - PAD_W, state.p2.y, '#f0f');
    drawBall();
    drawParticles();
    drawCountdown();

    // PAUSED overlay
    if (gameState === 'paused') {
      ctx.fillStyle = 'rgba(0,0,0,0.4)';
      ctx.fillRect(0, 0, W, H);
    }
  }

  let last = 0;
  function loop(ts = 0) {
    const delta = ts - last;
    if (delta >= 16) {
      // Countdown logic
      if (gameState === 'countdown') {
        countdown.timer += delta;
        if (countdown.timer >= 1000) {
          countdown.timer = 0;
          countdown.value--;
          if (countdown.value <= 0) {
            countdown.active = false;
            resetBall(countdown.nextDir);
            gameState = 'playing';
          }
        }
      }
      update(delta);
      draw();
      last = ts;
    }
    animId = requestAnimationFrame(loop);
  }

  // Input
  document.addEventListener('keydown', e => {
    switch(e.key) {
      case 'w': case 'W': state.p1.up = true; break;
      case 's': case 'S': state.p1.down = true; break;
      case 'ArrowUp': e.preventDefault(); state.p2.up = true; break;
      case 'ArrowDown': e.preventDefault(); state.p2.down = true; break;
      case ' ':
        e.preventDefault();
        if (gameState === 'waiting' || gameState === 'gameover') {
          cancelAnimationFrame(animId);
          startGame();
        } else if (gameState === 'playing') {
          gameState = 'paused';
          msg.innerHTML = 'PAUSA';
          msg.style.display = 'block';
        } else if (gameState === 'paused') {
          gameState = 'playing';
          msg.style.display = 'none';
        }
        break;
    }
  });

  document.addEventListener('keyup', e => {
    switch(e.key) {
      case 'w': case 'W': state.p1.up = false; break;
      case 's': case 'S': state.p1.down = false; break;
      case 'ArrowUp': state.p2.up = false; break;
      case 'ArrowDown': state.p2.down = false; break;
    }
  });

  // Initial render
  draw();
</script>
</body>
</html>
